<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Web Team — Operations Terminal{% endblock %}</title>
  <meta name="description" content="Web Team — all-in-one operations terminal: clone pages, audit SEO, and optimize page speed. Push to GitHub or download." />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M9 12h14M9 16h14M9 20h9' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="grid-overlay">
  <div class="ambient">
    <div class="blob a"></div><div class="blob b"></div><div class="blob c"></div>
  </div>

  <header class="nav" id="nav">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>
      web<span class="i">team</span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="{{ url_for('clone_page') }}" class="{{ 'active' if active=='clone' }}">Clone — HTML</a>
      <a href="{{ url_for('audit_page') }}" class="{{ 'active' if active=='audit' }}">Web — Audit</a>
      <a href="{{ url_for('optimizer_page') }}" class="{{ 'active' if active=='optimizer' }}">Optimizer — Portal</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">
    <div class="foot-in">
      <a class="brand" href="{{ url_for('home') }}" style="font-size:14px">
        <span class="logo" style="width:24px;height:24px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/></svg></span>
        web<span class="i">team</span>
      </a>
      <div class="links">
        <a href="{{ url_for('clone_page') }}">Clone — HTML</a>
        <a href="{{ url_for('audit_page') }}">Web — Audit</a>
        <a href="{{ url_for('optimizer_page') }}">Optimizer — Portal</a>
      </div>
      <span class="by">central operations terminal</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
